global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'qconduit'
    static_configs:
      # Railway internal networking: <service-name>.railway.internal
      # This assumes your API service is named exactly "qconduit" in Railway.
      # If you named it differently, update this line to match.
      - targets: ['qconduit.railway.internal:8000']
    metrics_path: '/metrics'