global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'qconduit'
    static_configs:
      # Railway internal networking: <service-name>.railway.internal
      # Assumes your main API service is named exactly "qconduit" in Railway.
      - targets: ['qconduit.railway.internal:8000']
    metrics_path: '/metrics'