# Prometheus service config — isolated from the repo-root railway.toml.
#
# In Railway dashboard for the prometheus service, set:
#   Root Directory:    deploy/railway/prometheus
#   Config File Path:  deploy/railway/prometheus/railway.toml

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3