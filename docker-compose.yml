version: "3.9"

services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  qconduit:
    build: .
    ports:
      - "8000:8000"
    environment:
      REDIS_URL:         redis://redis:6379
      TOTAL_BUDGET_USD:  ${TOTAL_BUDGET_USD:-5.0}
      GRAFANA_URL:       ${GRAFANA_URL:-http://localhost:3000/d/qconduit}
      API_BASE_URL:      ${API_BASE_URL:-http://localhost:8000}
      SARVAM_API_KEY:    ${SARVAM_API_KEY:-}
      OPENAI_API_KEY:    ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY:    ${GOOGLE_API_KEY:-}
      META_API_KEY:      ${META_API_KEY:-}
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    # No public port — Grafana reaches it over the internal Docker network only.
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - qconduit

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      # Anonymous viewers see every dashboard with no login.
      # Your real password still works for editing — set GRAFANA_ADMIN_PASSWORD in .env.
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_AUTH_ANONYMOUS_ENABLED:    "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE:   "Viewer"
      GF_AUTH_DISABLE_LOGIN_FORM:   "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus