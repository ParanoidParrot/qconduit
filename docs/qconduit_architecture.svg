```svg
<svg width="920" height="960" viewBox="0 0 920 960" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .box {
        fill: #f8fafc;
        stroke: #334155;
        stroke-width: 2;
        rx: 12;
      }

      .queue {
        fill: #eef2ff;
        stroke: #4338ca;
        stroke-width: 2;
        rx: 10;
      }

      .metric {
        fill: #ecfdf5;
        stroke: #047857;
        stroke-width: 2;
        rx: 10;
      }

      .title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 20px;
        font-weight: 700;
        fill: #0f172a;
      }

      .text {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 15px;
        fill: #1e293b;
      }

      .small {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        fill: #475569;
      }

      .label {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
        fill: #334155;
        font-weight: 600;
      }

      .arrow {
        stroke: #334155;
        stroke-width: 2;
        fill: none;
        marker-end: url(#arrowhead);
      }

      .dashed {
        stroke-dasharray: 6 6;
      }
    </style>

    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="460" y="40" text-anchor="middle" class="title">qconduit Architecture Flow</text>
  <text x="460" y="65" text-anchor="middle" class="small">
    Priority-based task routing, budget-aware execution, provider resilience, and observability
  </text>

  <!-- Your App -->
  <rect x="320" y="95" width="280" height="70" class="box" />
  <text x="460" y="125" text-anchor="middle" class="title">Your App</text>
  <text x="460" y="148" text-anchor="middle" class="small">Client application or backend service</text>

  <!-- Arrow to API -->
  <path d="M460 165 L460 220" class="arrow" />
  <text x="485" y="195" class="label">POST /tasks</text>
  <text x="485" y="214" class="small">action = tts, input = payload</text>

  <!-- API -->
  <rect x="230" y="230" width="460" height="130" class="box" />
  <text x="460" y="260" text-anchor="middle" class="title">qconduit API</text>
  <text x="460" y="284" text-anchor="middle" class="small">FastAPI</text>
  <text x="265" y="315" class="text">• Infers priority from action type</text>
  <text x="265" y="338" class="text">• Estimates cost from price_map.json</text>
  <text x="265" y="361" class="text">• Returns 202 Accepted with job_id immediately</text>

  <!-- Arrow to Redis -->
  <path d="M460 360 L460 415" class="arrow" />
  <text x="485" y="394" class="label">enqueue</text>

  <!-- Redis -->
  <rect x="255" y="425" width="410" height="60" class="box" />
  <text x="460" y="460" text-anchor="middle" class="title">Redis Priority Queues</text>

  <!-- Queues -->
  <rect x="120" y="525" width="190" height="90" class="queue" />
  <text x="215" y="557" text-anchor="middle" class="title">HIGH</text>
  <text x="215" y="583" text-anchor="middle" class="text">tts / stt</text>

  <rect x="365" y="525" width="190" height="90" class="queue" />
  <text x="460" y="557" text-anchor="middle" class="title">MEDIUM</text>
  <text x="460" y="583" text-anchor="middle" class="text">llm / translation</text>
  <text x="460" y="603" text-anchor="middle" class="small">webhook callbacks</text>

  <rect x="610" y="525" width="190" height="90" class="queue" />
  <text x="705" y="557" text-anchor="middle" class="title">LOW</text>
  <text x="705" y="583" text-anchor="middle" class="text">embedding</text>
  <text x="705" y="603" text-anchor="middle" class="small">batch jobs</text>

  <!-- Redis to Queues -->
  <path d="M460 485 L460 505 L215 505 L215 525" class="arrow" />
  <path d="M460 485 L460 525" class="arrow" />
  <path d="M460 485 L460 505 L705 505 L705 525" class="arrow" />

  <!-- Queues to Worker -->
  <path d="M215 615 L215 655 L460 655 L460 690" class="arrow" />
  <path d="M460 615 L460 690" class="arrow" />
  <path d="M705 615 L705 655 L460 655 L460 690" class="arrow" />
  <text x="485" y="677" class="label">dequeue highest priority first</text>

  <!-- Worker -->
  <rect x="210" y="700" width="500" height="150" class="box" />
  <text x="460" y="732" text-anchor="middle" class="title">Worker</text>
  <text x="245" y="765" class="text">• Budget check: throttle if limit is approaching</text>
  <text x="245" y="790" class="text">• Circuit breaker: skip unhealthy providers</text>
  <text x="245" y="815" class="text">• Execute: provider API call</text>
  <text x="245" y="840" class="text">• Settle budget: reserved → spent</text>

  <!-- Callback to Medium -->
  <path d="M710 775 C810 775 845 620 555 575" class="arrow dashed" />
  <text x="735" y="748" class="label">webhook callback</text>
  <text x="735" y="767" class="small">MEDIUM priority</text>

  <!-- Metrics -->
  <path d="M460 850 L460 890" class="arrow" />
  <text x="485" y="878" class="label">metrics</text>

  <rect x="250" y="900" width="180" height="50" class="metric" />
  <text x="340" y="931" text-anchor="middle" class="title">Prometheus</text>

  <path d="M430 925 L490 925" class="arrow" />

  <rect x="490" y="900" width="180" height="50" class="metric" />
  <text x="580" y="931" text-anchor="middle" class="title">Grafana</text>
</svg>
```
