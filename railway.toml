# Railway config for the qconduit service.
# Place this file at the repo root — Railway auto-detects it.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Must wrap in a shell so $PORT expands at runtime — Railway assigns this
# dynamically and exec-form commands won't substitute it.
startCommand = "/bin/sh -c \"uvicorn scheduler.main:app --host 0.0.0.0 --port $PORT\""
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3